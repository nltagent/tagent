# Дополняет дефолтный settings.yml SearxNG (use_default_settings: true
# подхватывает все остальные настройки как есть — здесь только то,
# что нужно переопределить).
use_default_settings: true

server:
  # Сгенерируйте свой: openssl rand -hex 32 — и замените это значение
  # перед деплоем. Значение по умолчанию использовать нельзя (небезопасно).
  secret_key: "a1779c97d1b4410e39299679133a9c636e500a87372f3888d5b3cb50b91aef76"
  # Инстанс приватный (доступен только вашему боту по внутренней сети
  # Railway) — анти-бот лимитер тут не нужен и может мешать запросам
  # от urllib (не похожим на браузер).
  limiter: false

search:
  formats:
    - html
    - json
